<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Vsinger Music</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f0f14;
      color: white;
      margin: 0;
      padding: 20px;
    }

    h1 {
      margin-bottom: 20px;
    }

    input, select, button {
      padding: 10px;
      font-size: 16px;
      margin-bottom: 15px;
    }

    .layout {
      display: flex;
      gap: 40px;
      align-items: flex-start;
    }

    /* 🎵 COLONNE GAUCHE */
    .music-column {
      flex: 2;
    }

    .song {
      margin-bottom: 10px;
    }

    a {
      color: #6cf;
      text-decoration: none;
      font-size: 16px;
    }

    /* 🎤 COLONNE DROITE */
    .artist-column {
      flex: 1;
      position: sticky;
      top: 20px;
      text-align: center;
    }

    .artist-column img {
      width: 650px;        /* largeur fixe */
      height: 650px;       /* hauteur fixe */
      object-fit: contain;  /* garde le ratio original */
      border-radius: 15px;
      margin-bottom: 20px;
      margin-left: -35%;
    }

    .artist-column h2 {
      font-size: 28px;
      margin: 0;
      margin-left: -35%;
    }

    .artist-column p {
      font-size: 18px;
      opacity: 0.8;
      margin-top: 8px;
      margin-left: -35%;
    }

    /* Responsive */
    @media (max-width: 900px) {
      .layout {
        flex-direction: column-reverse;
      }

      .artist-column {
        position: static;
      }

      .artist-column img, .artist-column h2, .artist-column p {
        width: 100%;
        margin-left: 0;
      }
    }
  </style>
</head>

<body>

<h1>🎵 Vsinger Music</h1>

<div>
  <select id="artistSelect" onchange="loadPlaylist()">
    <option value="0">Calliope Mori</option>
    <option value="1">Takanashi Kiara</option>
    <!-- Ajoute ici d'autres artistes si besoin -->
  </select>
</div>

<div class="layout">

  <!-- 🎵 MUSIQUES -->
  <div class="music-column">
    <input
      id="searchInput"
      placeholder="Rechercher une musique"
      oninput="filterSongs()"
    />
    <div id="songsList"></div>
  </div>

  <!-- 🎤 ARTISTE -->
  <div class="artist-column" id="artistContainer"></div>

</div>

<script>
  const API_KEY = "AIzaSyDZu5BQ_WvFPrEBkY8Ju98DcPtEwphVkh4"; // Remplace par ta vraie clé

  const artist = [
    {
      name: "Calliope Mori",
      image: "https://hololive.hololivepro.com/wp-content/uploads/2020/07/bg_Mori-Calliope_01.png",
      group: "Hololive EN – Myth",
      musicPlaylistId: "PLB8Nt5W7hnKA_pG2qljWbgVmJPobrLTm4"
    },
    {
      name: "Takanashi Kiara",
      image: "https://hololive.hololivepro.com/wp-content/uploads/2020/07/bg_Takanashi-Kiara_01.png",
      group: "Hololive EN – Myth",
      musicPlaylistId: "PLsAbCDORf2yRA9TvFeQkVXnSHdghrfNuH"
    }
  ];

  let allVideos = [];

  async function loadPlaylist() {
    const select = document.getElementById("artistSelect");
    const artistIndex = Number(select.value);
    const selectedArtist = artist[artistIndex];

    // Affichage de l'artiste
    document.getElementById("artistContainer").innerHTML = `
      <img src="${selectedArtist.image}">
      <h2>${selectedArtist.name}</h2>
      <p>${selectedArtist.group}</p>
    `;

    // Chargement des musiques
    allVideos = await getAllPlaylistVideos(selectedArtist.musicPlaylistId);
    displayVideos(allVideos);
  }

  async function getAllPlaylistVideos(playlistId) {
    let videos = [];
    let nextPageToken = "";

    do {
      const res = await fetch(
        `https://www.googleapis.com/youtube/v3/playlistItems?part=snippet&playlistId=${playlistId}&maxResults=50&pageToken=${nextPageToken}&key=${API_KEY}`
      );
      const data = await res.json();
      if (data.items) videos.push(...data.items);
      nextPageToken = data.nextPageToken || "";
    } while (nextPageToken);

    return videos;
  }

  function displayVideos(videos) {
    const list = document.getElementById("songsList");
    list.innerHTML = "";

    if (videos.length === 0) {
      list.innerHTML = "<p>Aucune musique trouvée.</p>";
      return;
    }

    videos.forEach(v => {
      if (!v.snippet?.resourceId) return;

      list.innerHTML += `
        <div class="song">
          <a href="https://www.youtube.com/watch?v=${v.snippet.resourceId.videoId}" target="_blank">
            ${v.snippet.title}
          </a>
        </div>
      `;
    });
  }

  function filterSongs() {
    const query = document.getElementById("searchInput").value.toLowerCase();
    const filtered = allVideos.filter(v =>
      v.snippet.title.toLowerCase().includes(query)
    );
    displayVideos(filtered);
  }

  // Charger l'artiste par défaut au démarrage
  loadPlaylist();
</script>

</body>
</html>
