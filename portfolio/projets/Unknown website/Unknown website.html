<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Unknown website</title>


    <style>

        .reaper {
            position: fixed;
            bottom: 20px;
            left: 150px;
            width: 450px;
            height: auto;
        }


        body {
            height: 100vh;        /* pour que le dégradé couvre toute la page */
            margin: 0;            /* enlever les marges par défaut */
            background: linear-gradient(to right, brown, black); /* dégradé */
        }
        /* Style du formulaire */
        form {
            border: 2px solid brown;
            padding: 20px;
            width: 300px;
            color: brown;
            margin: auto;
        }

        /* Conteneur des checkboxes */
        .checkbox-container {
            display: block;
            position: relative;
            padding-left: 35px; /* espace pour la fausse case */
            margin-bottom: 12px;
            cursor: pointer;
            font-size: 16px;
            color: brown;
            line-height: 25px; /* aligne verticalement le texte avec la case */
        }

        /* Cacher la checkbox réelle */
        .checkbox-container input {
            position: absolute;
            opacity: 0;
            cursor: pointer;
            height: 0;
            width: 0;
        }

        /* Créer une fausse case */
        .checkmark {
            position: absolute;
            top: 0;
            left: 0;
            height: 25px;
            width: 25px;
            background-color: black;
            border: 2px solid brown;
            border-radius: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Fond quand cochée */
        .checkbox-container input:checked ~ .checkmark {
            background-color: brown;
        }

        /* Tick */
        .checkmark:after {
            content: "";
            display: none;
            width: 5px;
            height: 12px;
            border: solid black;
            border-width: 0 3px 3px 0;
            transform: rotate(45deg);
        }

        /* Afficher le tick quand cochée */
        .checkbox-container input:checked ~ .checkmark:after {
            display: block;
        }
    </style>
</head>
<body>

    <br><br>
    <h1 style="text-align: center; color: brown;"><strong>If you see this page you were probably hacked</strong></h1>
    <br><br>
    <p style="text-align: center; color: brown; font-size: x-large;">To get your device back you have to answer this form</p>
    <br><br>

    <!-- Formulaire -->
    <section>
        <form id="choiceForm">
            <label class="checkbox-container">Work for us
                <input type="radio" name="choice" value="work">
                <span class="checkmark"></span>
            </label>

            <label class="checkbox-container">Pay $50K
                <input type="radio" name="choice" value="pay">
                <span class="checkmark"></span>
            </label>

            <label class="checkbox-container">Kill someone
                <input type="radio" name="choice" value="kill">
                <span class="checkmark"></span>
            </label>

            <input type="submit" value="Submit" style="background-color: black; color: brown; border: 2px solid brown; padding: 10px 20px; font-size: 16px; cursor: pointer; display: block;
            margin: 20px auto 0 auto; border-radius: 5px;">
        </form>
    </section>

    <script>
        document.getElementById("choiceForm").addEventListener("submit", function(e) {
        e.preventDefault();

        const choice = document.querySelector('input[name="choice"]:checked').value;

        const links = {
            work: "https://hackertyper.net",
            pay: "https://www.youtube.com",
            kill: "https://www.fbi.gov/wanted/fugitives"
        };

        window.open(links[choice], "_blank");
    });
    </script>



    
    <!--Image-->
    <img src="chibi reaper.png" class="reaper">
</body>
</html>
